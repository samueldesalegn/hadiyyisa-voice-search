AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Description: Hadiyyisa Voice Search Backend

Globals:
  Function:
    Timeout: 10
    Runtime: nodejs20.x
    MemorySize: 256
    LoggingConfig:
      LogFormat: JSON
    Environment:
      Variables:
        TABLE_NAME: !Ref HadiyyaWordsTable

Resources:
  HadiyyaWordsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: HadiyyaWords
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  SaveWordFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/handlers/saveWord.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref HadiyyaWordsTable
      Events:
        SaveWordApi:
          Type: Api
          Properties:
            Path: /words
            Method: post

  SearchWordsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/handlers/searchWords.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref HadiyyaWordsTable
      Events:
        SearchWordsApi:
          Type: Api
          Properties:
            Path: /words/search
            Method: get

Outputs:
  ApiBaseUrl:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/"